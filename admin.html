<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - تجويدو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --taj-green: #10b981;
            --taj-dark: #047857;
            --taj-blue: #0ea5e9;
            --taj-red: #ef4444;
            --taj-bg: #e0f2fe;
        }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, var(--taj-bg), #ecfdf5); min-height: 100vh; }
        .bg-taj-green { background-color: var(--taj-green) !important; }
        .bg-taj-dark  { background-color: var(--taj-dark)  !important; }
        .bg-taj-red   { background-color: var(--taj-red)   !important; }
        .text-taj-green { color: var(--taj-green) !important; }
        .text-taj-dark  { color: var(--taj-dark)  !important; }
        .text-taj-red   { color: var(--taj-red)   !important; }
        .hover\:bg-taj-dark:hover { background-color: var(--taj-dark) !important; }
        .glass-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        .spinner { border: 3px solid #e5e7eb; border-top-color: var(--taj-green); border-radius: 50%; width: 20px; height: 20px; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">

        <!-- رأس الصفحة -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="text-3xl">🛡️</div>
                <div>
                    <h1 class="text-2xl font-bold text-taj-dark">لوحة الإدارة</h1>
                    <p class="text-sm text-gray-500">تجويدو — إدارة حسابات المعلمين</p>
                </div>
            </div>
            <button id="admin-logout-btn" onclick="handleAdminLogout()" class="hidden bg-white border border-gray-200 hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-xl text-sm font-bold transition">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </button>
        </div>

        <!-- بوابة تسجيل الدخول -->
        <div id="admin-login-gate" class="glass-card rounded-2xl p-8 shadow-xl max-w-sm mx-auto">
            <div class="text-center mb-6">
                <div class="text-5xl mb-2">🔐</div>
                <h2 class="text-xl font-bold text-taj-dark">دخول الإدارة</h2>
                <p class="text-gray-500 text-sm mt-1">هذه الصفحة مخصصة لفريق الإدارة فقط</p>
            </div>
            <div id="admin-login-error" class="hidden bg-red-50 text-red-600 text-sm rounded-xl p-3 mb-4 text-center"></div>
            <div class="space-y-3">
                <input id="admin-login-email" type="email" placeholder="البريد الإلكتروني" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-taj-green" dir="ltr">
                <input id="admin-login-password" type="password" placeholder="كلمة المرور" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-taj-green" dir="ltr">
                <button id="admin-login-btn" onclick="handleAdminLogin()" class="w-full bg-taj-green hover:bg-taj-dark text-white font-bold py-3 rounded-xl transition">
                    تسجيل الدخول
                </button>
            </div>
        </div>

        <!-- شاشة "غير مصرح" (مسجّل دخول لكن مو عضو بفريق Admins) -->
        <div id="admin-forbidden-gate" class="hidden glass-card rounded-2xl p-8 shadow-xl max-w-sm mx-auto text-center">
            <div class="text-5xl mb-3">🚫</div>
            <h2 class="text-xl font-bold text-taj-red mb-2">غير مصرَّح لك بالدخول</h2>
            <p class="text-gray-500 text-sm">هذا الحساب مسجّل دخول لكنه ليس عضوًا بفريق الإدارة.</p>
        </div>

        <!-- المحتوى الرئيسي (بعد تأكيد صلاحية الأدمن) -->
        <div id="admin-dashboard-content" class="hidden">

            <div class="glass-card rounded-2xl p-6 shadow-xl mb-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-taj-dark flex items-center gap-2">
                        <i class="fas fa-user-clock text-taj-green"></i>
                        معلمون بانتظار الموافقة
                    </h2>
                    <button onclick="loadPendingTeachers()" class="text-gray-400 hover:text-taj-green transition" title="تحديث">
                        <i class="fas fa-rotate"></i>
                    </button>
                </div>

                <div id="pending-loading" class="flex items-center justify-center gap-2 text-gray-400 py-8">
                    <div class="spinner"></div>
                    <span class="text-sm">جارٍ التحميل...</span>
                </div>

                <div id="pending-empty" class="hidden text-center text-gray-400 py-8 text-sm">
                    لا يوجد معلمون بانتظار الموافقة حاليًا 🎉
                </div>

                <div id="pending-error" class="hidden bg-red-50 text-red-600 text-sm rounded-xl p-3 text-center"></div>

                <div id="pending-list" class="hidden space-y-3"></div>
            </div>

        </div>

    </div>

    <!-- Toast بسيط -->
    <div id="admin-toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50"></div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@26.1.0"></script>
    <script>
        const { Client, Account, Teams, Functions } = Appwrite;

        const appwriteClient = new Client()
            .setEndpoint('__APPWRITE_ENDPOINT__')
            .setProject('__APPWRITE_PROJECT_ID__');

        const account = new Account(appwriteClient);
        const functions = new Functions(appwriteClient);
        const SECURITY_FUNCTION_ID = '__SECURITY_FUNCTION_ID__';

        // ===================== أدوات مساعدة =====================

        function showToast(msg) {
            const t = document.getElementById('admin-toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function showAdminLoginError(msg) {
            const el = document.getElementById('admin-login-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function clearAdminLoginError() {
            document.getElementById('admin-login-error').classList.add('hidden');
        }

        // يستدعي دالة الأمان بنفس نمط index.html — تنفيذ متزامن، جسم JSON، تحليل الرد
        async function callSecurityFunction(action, extraPayload) {
            if (!SECURITY_FUNCTION_ID) {
                showToast('SECURITY_FUNCTION_ID غير مضبوط بهذا النشر');
                return null;
            }
            try {
                const exec = await functions.createExecution({
                    functionId: SECURITY_FUNCTION_ID,
                    body: JSON.stringify({ action, ...(extraPayload || {}) }),
                });
                return JSON.parse(exec.responseBody || '{}');
            } catch (err) {
                console.error(`تعذر استدعاء دالة الأمان "${action}":`, err);
                return { ok: false, error: 'تعذر الاتصال بالخادم' };
            }
        }

        // ===================== تسجيل الدخول / الخروج =====================

        async function handleAdminLogin() {
            clearAdminLoginError();
            const email = document.getElementById('admin-login-email').value.trim();
            const password = document.getElementById('admin-login-password').value;
            if (!email || !password) {
                showAdminLoginError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            const btn = document.getElementById('admin-login-btn');
            btn.disabled = true;
            btn.textContent = 'جارٍ الدخول...';
            try {
                try { await account.deleteSessions(); } catch (_) { /* لا توجد جلسة أصلًا */ }
                await account.createEmailPasswordSession({ email, password });
                await refreshAdminAuthUI();
            } catch (err) {
                showAdminLoginError('فشل تسجيل الدخول: تأكد من البريد الإلكتروني وكلمة المرور');
            } finally {
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            }
        }

        async function handleAdminLogout() {
            try { await account.deleteSessions(); } catch (_) { /* تجاهل */ }
            await refreshAdminAuthUI();
        }

        // يتحقق من الجلسة، ثم من عضوية فريق الإدارة (عبر تنفيذ آمن بدالة الأمان
        // نفسها، بدل التحقق مباشرة من العميل، حتى لا يعتمد الأمان على كود
        // يمكن لأي شخص تعديله بأدوات المطور بالمتصفح)
        async function refreshAdminAuthUI() {
            const loginGate = document.getElementById('admin-login-gate');
            const forbiddenGate = document.getElementById('admin-forbidden-gate');
            const dashboard = document.getElementById('admin-dashboard-content');
            const logoutBtn = document.getElementById('admin-logout-btn');

            loginGate.classList.add('hidden');
            forbiddenGate.classList.add('hidden');
            dashboard.classList.add('hidden');
            logoutBtn.classList.add('hidden');
            clearAdminLoginError();

            let user;
            try {
                user = await account.get();
            } catch (err) {
                loginGate.classList.remove('hidden');
                return;
            }

            logoutBtn.classList.remove('hidden');

            // نتحقق من صلاحية الأدمن عبر استدعاء إجراء حقيقي (listPendingTeachers)
            // بدل فحص العضوية مباشرة، لأن الدالة نفسها هي مصدر الحقيقة الأمني
            const result = await callSecurityFunction('listPendingTeachers');
            if (!result || !result.ok) {
                forbiddenGate.classList.remove('hidden');
                return;
            }

            dashboard.classList.remove('hidden');
            renderPendingTeachers(result.teachers || []);
        }

        // ===================== قائمة المعلمين المعلَّقين =====================

        async function loadPendingTeachers() {
            document.getElementById('pending-loading').classList.remove('hidden');
            document.getElementById('pending-empty').classList.add('hidden');
            document.getElementById('pending-error').classList.add('hidden');
            document.getElementById('pending-list').classList.add('hidden');

            const result = await callSecurityFunction('listPendingTeachers');

            document.getElementById('pending-loading').classList.add('hidden');

            if (!result || !result.ok) {
                const el = document.getElementById('pending-error');
                el.textContent = (result && result.error) || 'تعذر جلب القائمة';
                el.classList.remove('hidden');
                return;
            }

            renderPendingTeachers(result.teachers || []);
        }

        function renderPendingTeachers(teachers) {
            const listEl = document.getElementById('pending-list');
            const emptyEl = document.getElementById('pending-empty');

            if (teachers.length === 0) {
                listEl.classList.add('hidden');
                emptyEl.classList.remove('hidden');
                return;
            }

            emptyEl.classList.add('hidden');
            listEl.classList.remove('hidden');
            listEl.innerHTML = teachers.map(t => `
                <div class="bg-gray-50 rounded-xl p-4 flex items-center justify-between flex-wrap gap-3">
                    <div>
                        <p class="font-bold text-gray-800">${escapeHtml(t.fullName || 'بدون اسم')}</p>
                        <p class="text-xs text-gray-500 mt-0.5">${escapeHtml(t.schoolName || 'بدون مدرسة')} · ${formatDate(t.createdAt)}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="handleApprove('${t.id}')" class="bg-taj-green hover:bg-taj-dark text-white text-sm font-bold px-4 py-2 rounded-lg transition">
                            <i class="fas fa-check"></i> قبول
                        </button>
                        <button onclick="handleReject('${t.id}')" class="bg-white border border-red-200 hover:bg-red-50 text-taj-red text-sm font-bold px-4 py-2 rounded-lg transition">
                            <i class="fas fa-xmark"></i> رفض
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function handleApprove(teacherId) {
            const result = await callSecurityFunction('approveTeacher', { teacherId });
            if (result && result.ok) {
                showToast('تمت الموافقة على المعلم ✅');
                await loadPendingTeachers();
            } else {
                showToast((result && result.error) || 'تعذرت العملية');
            }
        }

        async function handleReject(teacherId) {
            if (!confirm('هل أنت متأكد من رفض هذا الحساب؟')) return;
            const result = await callSecurityFunction('rejectTeacher', { teacherId });
            if (result && result.ok) {
                showToast('تم رفض الحساب');
                await loadPendingTeachers();
            } else {
                showToast((result && result.error) || 'تعذرت العملية');
            }
        }

        // ===================== أدوات نص عامة =====================

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str == null ? '' : String(str);
            return div.innerHTML;
        }

        function formatDate(isoStr) {
            if (!isoStr) return '';
            try {
                return new Date(isoStr).toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch (_) {
                return '';
            }
        }

        // ===================== بدء التشغيل =====================

        refreshAdminAuthUI();
    </script>
</body>
</html>
